<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background: #0a0e17;
            color: #8ba4c7;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        h1 { font-size: 72px; margin: 0; background: linear-gradient(135deg, #00d4ff, #0090ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 18px; color: #597799; margin: 12px 0 24px; }
        a { color: #00d4ff; text-decoration: none; padding: 10px 24px; border: 1px solid rgba(0,180,255,0.25); border-radius: 8px; transition: 0.3s; }
        a:hover { background: rgba(0,180,255,0.08); border-color: #00d4ff; }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Orbit lost. This page doesn't exist.</p>
    <a href="/">🛰️ Return to GeoLocator</a>
</body>
</html>
